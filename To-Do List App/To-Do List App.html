<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Creative To-Do List</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#84fab0);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.app{
width:420px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
color:white;
}

h1{
margin-bottom:20px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#ff6b6b;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

ul{
margin-top:20px;
list-style:none;
max-height:300px;
overflow:auto;
}

li{
background:rgba(255,255,255,0.25);
padding:12px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

li:hover{
transform:scale(1.03);
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

.delete{
background:#ff3b3b;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<h1>✨ My To-Do List</h1>

<div class="input-box">
<input id="taskInput" placeholder="Enter a new task...">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function renderTasks(){

let list=document.getElementById("taskList");
list.innerHTML="";

tasks.forEach((task,index)=>{

let li=document.createElement("li");

if(task.completed) li.classList.add("completed");

li.innerHTML=`
<span onclick="toggleTask(${index})">${task.text}</span>
<span class="delete" onclick="deleteTask(${index})">✖</span>
`;

list.appendChild(li);

});

}

function addTask(){

let input=document.getElementById("taskInput");
let text=input.value.trim();

if(text==="") return;

tasks.push({text:text,completed:false});

input.value="";

saveTasks();
renderTasks();

}

function toggleTask(index){

tasks[index].completed=!tasks[index].completed;

saveTasks();
renderTasks();

}

function deleteTask(index){

tasks.splice(index,1);

saveTasks();
renderTasks();

}

renderTasks();

</script>

</body>
</html>
