<!DOCTYPE html>
<html>
<head>
<title>Sunny Weather UI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;

    /* Real sky gradient */
    background: linear-gradient(to top, #87ceeb, #e6f7ff);
}

/* Sun (realistic glow + pulse) */
.sun {
    position: absolute;
    top: 80px;
    right: 120px;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, #fff9c4, #ffd54f);
    border-radius: 50%;
    box-shadow: 0 0 80px rgba(255, 223, 0, 0.6);
    animation: sunPulse 6s ease-in-out infinite;
}

@keyframes sunPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 80px rgba(255,223,0,0.6); }
    50% { transform: scale(1.05); box-shadow: 0 0 120px rgba(255,223,0,0.8); }
}

/* Clouds (slow, smooth, realistic) */
.cloud {
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 50px;
    filter: blur(8px);
}

.cloud1 {
    width: 220px;
    height: 80px;
    top: 120px;
    left: -250px;
    animation: moveClouds 80s linear infinite;
}

.cloud2 {
    width: 300px;
    height: 100px;
    top: 200px;
    left: -300px;
    animation: moveClouds 120s linear infinite;
}

@keyframes moveClouds {
    from { transform: translateX(0); }
    to { transform: translateX(130vw); }
}

/* Light haze overlay */
.haze {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.1);
}

/* Glass cards */
.container {
    position: relative;
    display: flex;
    justify-content: center;
    gap: 25px;
    top: 220px;
}

.card {
    width: 250px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    color: #333;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-8px);
}

/* Text */
.city { font-size: 20px; font-weight: 600; }
.temp { font-size: 42px; font-weight: bold; margin: 10px 0; }
.condition { font-size: 16px; }
.details { margin-top: 10px; font-size: 14px; line-height: 1.6; }

h1 {
    text-align: center;
    margin-top: 40px;
    color: #333;
}

</style>
</head>

<body>

<div class="sun"></div>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="haze"></div>

<h1>Weather Dashboard</h1>

<div class="container">

    <div class="card">
        <div class="city">Mumbai</div>
        <div class="temp">32°C</div>
        <div class="condition">Partly Cloudy</div>
        <div class="details">
            Humidity: 70%<br>
            Wind: 12 km/h<br>
            Feels like: 34°C
        </div>
    </div>

    <div class="card">
        <div class="city">Delhi</div>
        <div class="temp">38°C</div>
        <div class="condition">Sunny</div>
        <div class="details">
            Humidity: 40%<br>
            Wind: 8 km/h<br>
            Feels like: 41°C
        </div>
    </div>

    <div class="card">
        <div class="city">Pune</div>
        <div class="temp">24°C</div>
        <div class="condition">Light Clouds</div>
        <div class="details">
            Humidity: 60%<br>
            Wind: 10 km/h<br>
            Feels like: 25°C
        </div>
    </div>

</div>

</body>
</html>
